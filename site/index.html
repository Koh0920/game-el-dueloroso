<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>El Dueloroso</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#0b0b12;color:#eee;font-family:system-ui,sans-serif}
  #game{width:100%;height:calc(100% - 34px)}
  footer{height:34px;display:flex;align-items:center;justify-content:center;gap:14px;font-size:12px;color:#9aa}
  footer a{color:#8bd}
</style>
</head>
<body>
<div id="game"></div>
<footer>
  <span>El Dueloroso © Adrián J.G. — GPL-3.0</span>
  <a href="licenses/">Licenses &amp; credits</a>
</footer>
<script>
  window.EJS_player = "#game";
  window.EJS_core = "gambatte";
  window.EJS_gameName = "El Dueloroso";
  window.EJS_gameUrl = "ElDueloroso.gb";
  window.EJS_pathtodata = "data/";
  window.EJS_startOnLoaded = true;
  window.EJS_backgroundColor = "#0b0b12";
</script>
<script src="data/loader.js"></script>
<script>
  // Optional Ato live-continuation pause profile. No credentials cross this
  // boundary; only the trusted parent console may pause/resume the emulator.
  (() => {
    const trustedParents = new Set([
      "https://ato.run",
      "https://app.ato.run",
      "https://stg-app.ato.run",
    ]);
    let pausedByAto = false;

    function trustedParent(origin) {
      if (trustedParents.has(origin)) return true;
      try {
        const url = new URL(origin);
        return (
          (url.protocol === "http:" || url.protocol === "https:") &&
          (url.hostname === "localhost" || url.hostname === "127.0.0.1")
        );
      } catch (_) {
        return false;
      }
    }

    window.addEventListener("message", (event) => {
      const message = event.data;
      if (
        event.source !== window.parent ||
        !trustedParent(event.origin) ||
        !message ||
        message.type !== "ato.session-control.v1" ||
        (message.action !== "pause" && message.action !== "resume") ||
        typeof message.request_id !== "string" ||
        message.request_id.length > 128
      ) return;

      const emulator = window.EJS_emulator;
      let ok = false;
      try {
        if (!emulator || emulator.started !== true) {
          ok = false;
        } else if (message.action === "pause") {
          if (!emulator.paused) {
            emulator.pause();
            pausedByAto = true;
          }
          ok = emulator.paused === true;
        } else {
          if (pausedByAto) emulator.play();
          pausedByAto = false;
          ok = true;
        }
      } catch (_) {
        ok = false;
      }

      event.source.postMessage({
        type: "ato.session-control.v1.ack",
        action: message.action,
        request_id: message.request_id,
        ok,
      }, event.origin);
    });
  })();
</script>
</body>
</html>
